- name: Testing "fileglob" lookup plug-in
  hosts: client1_vm_rhel9
  become: false
  gather_facts: true
  tasks:
    - name: Running "fileglob"
      ansible.builtin.debug:
        msg: "{{ item }}"
      loop: "{{ query('fileglob', '~/.*~') }}"
    - name: Running "fileglob" again
      ansible.builtin.debug:
        msg: "{{ lookup('fileglob', '~/.*~') }}"

- name: Test caching of facts
  hosts: client1_vm_rhel9
  become: false
  gather_facts: false
  tasks:
    - name: Run debug
      ansible.builtin.debug:
        var: ansible_facts

