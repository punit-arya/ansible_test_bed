centos7:
    children:
        clients-vm-centos7:
            hosts:
                client1-vm-centos7:
                    ansible_host: 172.16.65.10
            vars:
                enabled: True
        servers-vm-centos7:
            hosts:
                server1-vm-centos7:
                    ansible_host: 172.16.65.15
    vars:
        ansible_python_interpreter: /opt/rh/rh-python38/root/bin/python3.8
        # galaxy_api_key: "{{ undef(hint='You must specify your Galaxy API  key') }}"
        galaxy_api_key: "CENTOSKEY"
        status: needs
        enabled: False

rhel9:
    children:
        clients-vm-rhel9:
            hosts:
                client1-vm-rhel9:
                    ansible_host: 172.16.65.30
        servers-vm-rhel9:
            hosts:
                server1-vm-rhel9:
                    ansible_host: 172.16.65.35
                    enabled: False
                    status: needs
                server2-vm-rhel9:
                    ansible_host: 172.16.65.36
                    enabled:
                server3-vm-rhel9:
                    ansible_host: 172.16.65.37
                    enabled: None
    vars:
        status: needs_restart
        enabled: True
        ansible_python_interpreter: /usr/bin/python
        galaxy_api_key: "APIKEY"

rhel10:
    children:
        clients-vm-rhel10:
            hosts:
                client1-vm-rhel10:
                    ansible_host: 172.16.65.40
        servers-vm-rhel10:
            hosts:
                server1-vm-rhel10:
                    ansible_host: 172.16.65.45
                    enabled: False
                    status: needs
                server2-vm-rhel10:
                    ansible_host: 172.16.65.46
                    enabled:
                server3-vm-rhel10:
                    ansible_host: 172.16.65.47
                    enabled: None
    vars:
        status: needs_restart
        enabled: True
        ansible_python_interpreter: /usr/bin/python
        galaxy_api_key: "APIKEY"
