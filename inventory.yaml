vm_centos7:
    children:
        vm_centos7_clients:
            hosts:
                vm-centos7-client1:
                    ansible_host: 172.16.65.10
            vars:
                enabled: True
        vm_centos7_servers:
            hosts:
                vm-centos7-server1:
                    ansible_host: 172.16.65.15
    vars:
        ansible_python_interpreter: /opt/rh/rh-python38/root/bin/python3.8
        # galaxy_api_key: "{{ undef(hint='You must specify your Galaxy API  key') }}"
        galaxy_api_key: "CENTOSKEY"
        status: needs
        enabled: False

vm_rhel9:
    children:
        vm_rhel9_clients:
            hosts:
                vm-rhel9-client1:
                    ansible_host: 172.16.65.30
        vm_rhel9_servers:
            hosts:
                vm-rhel9-server1:
                    ansible_host: 172.16.65.35
                    enabled: False
                    status: needs
                vm-rhel9-server2:
                    ansible_host: 172.16.65.36
                    enabled:
                vm-rhel9-server3:
                    ansible_host: 172.16.65.37
                    enabled: None
    vars:
        status: needs_restart
        enabled: True
        ansible_python_interpreter: /usr/bin/python
        galaxy_api_key: "APIKEY"

vm_rhel10:
    children:
        vm_rhel10_clients:
            hosts:
                vm-rhel10-client1:
                    ansible_host: 172.16.65.40
        vm_rhel10_servers:
            hosts:
                vm-rhel10-server1:
                    ansible_host: 172.16.65.45
                    enabled: False
                    status: needs
                vm-rhel10-server2:
                    ansible_host: 172.16.65.46
                    enabled:
                vm-rhel10-server3:
                    ansible_host: 172.16.65.47
                    enabled: None
    vars:
        status: needs_restart
        enabled: True
        ansible_python_interpreter: /usr/bin/python
        galaxy_api_key: "APIKEY"
